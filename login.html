<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PitchForge — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script defer src="/analytics.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --forest:#0b1e13;--forest-mid:#142b1d;
      --mint:#00d68f;--mint-dim:#00b578;--mint-pale:rgba(0,214,143,0.12);
      --cream:#f9f7f1;--white:#fff;
      --ink:#0f1a13;--ink-mid:#3a4e3f;--ink-light:#7a8f80;--ink-xlight:#b0c0b5;
      --border:rgba(15,26,19,0.10);--border-mid:rgba(15,26,19,0.18);
      --on-dark:rgba(255,255,255,0.50);--on-dark-border:rgba(255,255,255,0.10);
      --radius:10px;--radius-lg:16px;--radius-xl:24px;
      --fd:'Fraunces',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--fb);background:var(--forest);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    /* nav */
    nav{padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--on-dark-border)}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-mark{width:32px;height:32px;background:var(--mint);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo-name{font-family:var(--fd);font-size:18px;font-weight:500;color:white;letter-spacing:-0.02em}
    .nav-back{font-size:13px;color:var(--on-dark);text-decoration:none;transition:color 0.15s}
    .nav-back:hover{color:white}
    /* main */
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem}
    .auth-card{width:100%;max-width:440px;background:rgba(255,255,255,0.04);border:0.5px solid var(--on-dark-border);border-radius:var(--radius-xl);padding:2.5rem;animation:up 0.4s ease both}
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .auth-title{font-family:var(--fd);font-size:28px;font-weight:400;color:white;letter-spacing:-0.025em;margin-bottom:0.4rem;line-height:1.1}
    .auth-title em{font-style:italic;color:var(--mint)}
    .auth-sub{font-size:14px;font-weight:300;color:var(--on-dark);margin-bottom:2rem;line-height:1.6}
    /* tabs */
    .tabs{display:flex;gap:0;margin-bottom:1.75rem;background:rgba(255,255,255,0.05);border-radius:var(--radius);padding:3px}
    .tab{flex:1;padding:8px;font-size:13px;font-weight:500;font-family:var(--fb);background:transparent;color:rgba(255,255,255,0.45);border:none;border-radius:7px;cursor:pointer;transition:all 0.15s}
    .tab.active{background:var(--mint);color:var(--forest)}
    /* form */
    .field{margin-bottom:1rem}
    .field-label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.35);margin-bottom:7px}
    .field-input{width:100%;padding:11px 14px;font-size:14px;font-family:var(--fb);background:rgba(255,255,255,0.06);color:white;border:1px solid rgba(255,255,255,0.10);border-radius:var(--radius);outline:none;transition:border-color 0.15s}
    .field-input:focus{border-color:var(--mint)}
    .field-input::placeholder{color:rgba(255,255,255,0.2)}
    .submit-btn{width:100%;padding:13px;font-size:15px;font-weight:500;font-family:var(--fb);background:var(--mint);color:var(--forest);border:none;border-radius:var(--radius);cursor:pointer;margin-top:0.5rem;transition:background 0.15s}
    .submit-btn:hover{background:var(--mint-dim)}
    .submit-btn:disabled{opacity:0.5;cursor:not-allowed}
    .divider{height:0.5px;background:rgba(255,255,255,0.08);margin:1.5rem 0}
    /* messages */
    .msg{font-size:13px;padding:10px 14px;border-radius:var(--radius);margin-top:1rem;display:none}
    .msg-error{background:rgba(220,60,60,0.15);color:#ff9999;border:0.5px solid rgba(220,60,60,0.2)}
    .msg-success{background:var(--mint-pale);color:var(--mint);border:0.5px solid rgba(0,214,143,0.2)}
    .footer-note{font-size:12px;color:rgba(255,255,255,0.2);text-align:center;margin-top:1.5rem;line-height:1.6}
    .footer-note a{color:rgba(255,255,255,0.4);text-decoration:none}
    .footer-note a:hover{color:white}
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/index.html">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3.5 9.5l4 4 7-8" stroke="#0b1e13" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="logo-name">PitchForge</span>
  </a>
  <a class="nav-back" href="/index.html">← Back to home</a>
</nav>

<main>
  <div class="auth-card">
    <h1 class="auth-title">Welcome to<br><em>PitchForge.</em></h1>
    <p class="auth-sub" id="auth-sub">Sign in to your account to generate and save cold emails.</p>

    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
    </div>

    <!-- Sign In -->
    <div id="form-signin">
      <div class="field">
        <label class="field-label" for="si-email">Email</label>
        <input class="field-input" type="email" id="si-email" placeholder="you@company.com">
      </div>
      <div class="field">
        <label class="field-label" for="si-password">Password</label>
        <input class="field-input" type="password" id="si-password" placeholder="••••••••">
      </div>
      <button class="submit-btn" id="si-btn" onclick="signIn()">Sign in →</button>
      <div class="msg msg-error" id="si-error"></div>
    </div>

    <!-- Sign Up -->
    <div id="form-signup" style="display:none">
      <div class="field">
        <label class="field-label" for="su-name">Full name</label>
        <input class="field-input" type="text" id="su-name" placeholder="Alex Chen">
      </div>
      <div class="field">
        <label class="field-label" for="su-email">Email</label>
        <input class="field-input" type="email" id="su-email" placeholder="you@company.com">
      </div>
      <div class="field">
        <label class="field-label" for="su-password">Password</label>
        <input class="field-input" type="password" id="su-password" placeholder="Min. 8 characters">
      </div>
      <button class="submit-btn" id="su-btn" onclick="signUp()">Create account →</button>
      <div class="msg msg-error" id="su-error"></div>
      <div class="msg msg-success" id="su-success"></div>
    </div>

    <p class="footer-note">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = 'https://ixazhhmcgtgrknmwndbp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4YXpoaG1jZ3RncmtubXduZGJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk4NDQ1OTAsImV4cCI6MjA3NTQyMDU5MH0.asvClCcNhiZwOZDlNhYB8PKd6Um1lbAdUFTwfaX_O_8';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Redirect if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/dashboard.html';
  });

  function switchTab(tab) {
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('auth-sub').textContent = tab === 'signin'
      ? 'Sign in to your account to generate and save cold emails.'
      : 'Create your free account. No credit card required.';
  }

  async function signIn() {
    const email    = document.getElementById('si-email').value.trim();
    const password = document.getElementById('si-password').value;
    const btn      = document.getElementById('si-btn');
    const err      = document.getElementById('si-error');
    err.style.display = 'none';
    if (!email || !password) { showErr(err, 'Please enter your email and password.'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showErr(err, error.message); btn.disabled = false; btn.textContent = 'Sign in →'; return; }
    window.location.href = '/dashboard.html';
  }

  async function signUp() {
    const name     = document.getElementById('su-name').value.trim();
    const email    = document.getElementById('su-email').value.trim();
    const password = document.getElementById('su-password').value;
    const btn      = document.getElementById('su-btn');
    const err      = document.getElementById('su-error');
    const success  = document.getElementById('su-success');
    err.style.display = 'none'; success.style.display = 'none';
    if (!name || !email || !password) { showErr(err, 'Please fill in all fields.'); return; }
    if (password.length < 8) { showErr(err, 'Password must be at least 8 characters.'); return; }
    btn.disabled = true; btn.textContent = 'Creating account…';
    const { error } = await sb.auth.signUp({
      email, password,
      options: {
        data: { full_name: name },
        emailRedirectTo: window.location.origin + '/dashboard.html',
      }
    });
    if (error) { showErr(err, error.message); btn.disabled = false; btn.textContent = 'Create account →'; return; }
    success.textContent = '✓ Check your email to confirm your account, then sign in.';
    success.style.display = 'block';
    btn.textContent = 'Account created!';
  }

  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activeForm = document.getElementById('form-signin').style.display !== 'none' ? 'signin' : 'signup';
      if (activeForm === 'signin') signIn(); else signUp();
    }
  });
</script>
</body>
</html>
